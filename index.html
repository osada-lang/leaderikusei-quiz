<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>リーダー育成検定（〇×・全17問）</title>
  <style>
    :root{
      --bg:#07101f;
      --card:#0d1930;
      --card2:#0b1427;
      --text:#eaf0ff;
      --muted:#a7b4d0;
      --border: rgba(255,255,255,.12);
      --accent:#60a5fa;
      --good:#34d399;
      --bad:#fb7185;
      --warn:#fbbf24;
      --shadow: 0 14px 40px rgba(0,0,0,.35);
      --radius: 18px;
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:
        radial-gradient(1100px 680px at 15% 0%, rgba(96,165,250,.20), transparent 55%),
        radial-gradient(1000px 680px at 100% 20%, rgba(52,211,153,.16), transparent 58%),
        var(--bg);
      color: var(--text);
    }
    .app{
      min-height:100%;
      padding-bottom: calc(108px + env(safe-area-inset-bottom));
    }
    header{
      padding: 18px 16px 10px;
      max-width: 920px;
      margin: 0 auto;
    }
    h1{
      margin: 0 0 6px;
      font-size: 18px;
      letter-spacing: .2px;
    }
    .sub{
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .container{
      max-width: 920px;
      margin: 0 auto;
      padding: 10px 16px 0;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardHd{
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid var(--border);
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(7,16,31,.25);
      font-size: 12px;
      white-space: nowrap;
    }

    .progressWrap{
      padding: 12px 14px 8px;
    }
    .progressBar{
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .progressBar > div{
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(96,165,250,.95), rgba(52,211,153,.90));
      transition: width .25s ease;
    }
    .progressMeta{
      display:flex;
      justify-content: space-between;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      gap: 10px;
      flex-wrap: wrap;
    }

    .qBody{
      padding: 12px 14px 14px;
    }
    .qNo{
      font-weight: 900;
      font-size: 14px;
      letter-spacing: .3px;
      margin-bottom: 8px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }
    .qText{
      margin: 0;
      font-size: 16px;
      line-height: 1.8;
      color: var(--text);
    }

    .choices{
      margin-top: 14px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .choiceBtn{
      width:100%;
      padding: 16px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-weight: 900;
      font-size: 18px;
      cursor: pointer;
      user-select:none;
      transition: transform .10s ease, background .12s ease, border-color .12s ease;
      min-height: 56px; /* tap target */
    }
    .choiceBtn:active{ transform: scale(.99); }
    .choiceBtn.selected{
      border-color: rgba(96,165,250,.75);
      background: rgba(96,165,250,.14);
      box-shadow: 0 0 0 3px rgba(96,165,250,.18);
    }

    .hint{
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    /* bottom nav */
    .bottomNav{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(7,16,31,.78);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
    }
    .bottomInner{
      max-width: 920px;
      margin: 0 auto;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .navBtn{
      width:100%;
      padding: 14px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-weight: 900;
      font-size: 15px;
      cursor:pointer;
      min-height: 54px;
    }
    .navBtn.primary{
      border: 0;
      color: #061021;
      background: linear-gradient(90deg, rgba(96,165,250,.95), rgba(52,211,153,.90));
    }
    .navBtn:disabled{
      opacity: .45;
      cursor:not-allowed;
    }

    .row{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items:center;
      justify-content: space-between;
      margin-top: 12px;
    }
    .toggle{
      display:flex;
      align-items:center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    input[type="checkbox"]{
      width: 18px; height: 18px;
      accent-color: var(--accent);
    }

    /* results */
    .resultCard{
      margin-top: 12px;
    }
    .resultBody{
      padding: 14px;
    }
    .scoreLine{
      display:flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .score{
      font-size: 34px;
      font-weight: 1000;
      letter-spacing: .6px;
    }
    .grade{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      font-weight: 900;
      font-size: 13px;
    }
    .grade.special{ background: rgba(52,211,153,.14); border-color: rgba(52,211,153,.35); }
    .grade.one{ background: rgba(96,165,250,.14); border-color: rgba(96,165,250,.35); }
    .grade.two{ background: rgba(251,191,36,.12); border-color: rgba(251,191,36,.35); }
    .grade.three{ background: rgba(251,113,133,.10); border-color: rgba(251,113,133,.35); }

    .summary{
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .review{
      margin-top: 10px;
      display:grid;
      gap: 10px;
    }
    details{
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(11,20,39,.35);
      overflow:hidden;
    }
    summary{
      cursor:pointer;
      padding: 12px 12px;
      list-style: none;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 900;
      font-size: 13px;
      color: var(--text);
    }
    summary::-webkit-details-marker{ display:none; }
    .mark{
      font-weight: 1000;
      font-size: 12px;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      white-space: nowrap;
    }
    .mark.ok{ color: var(--good); border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.10); }
    .mark.ng{ color: var(--bad); border-color: rgba(251,113,133,.35); background: rgba(251,113,133,.10); }

    .detailBody{
      padding: 0 12px 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.75;
    }
    .detailBody b{ color: var(--text); }

    .ghostActions{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .ghostBtn{
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-weight: 900;
      font-size: 13px;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>リーダー育成検定（〇×問題・全17問）</h1>
      <div class="sub">1問ずつ回答 → 最後に採点（級判定＋解説）を表示します。未回答は不正解扱いです。</div>
    </header>

    <main class="container">
      <section class="card" aria-label="クイズ本体">
        <div class="cardHd">
          <div class="badge" id="modeBadge">出題：固定順</div>
          <div class="badge">形式：〇×</div>
        </div>

        <div class="progressWrap">
          <div class="progressBar" aria-label="進捗バー"><div id="bar"></div></div>
          <div class="progressMeta">
            <div>現在：<b><span id="pos">1</span></b> / 17</div>
            <div>回答済み：<b><span id="answered">0</span></b> / 17</div>
          </div>

          <div class="row">
            <label class="toggle">
              <input type="checkbox" id="shuffle" />
              問題順をシャッフル
            </label>
            <div class="badge" id="saveHint">※この端末内だけで完結（外部送信なし）</div>
          </div>
        </div>

        <div class="qBody" id="qArea">
          <!-- injected -->
        </div>
      </section>

      <section class="card resultCard" id="resultCard" style="display:none;" aria-label="採点結果">
        <div class="cardHd">
          <div class="badge">採点結果</div>
          <div class="badge">判定基準：17=特級 / 14-16=1級 / 11-13=2級 / 0-10=3級</div>
        </div>
        <div class="resultBody" id="resultBody"></div>
      </section>
    </main>
  </div>

  <nav class="bottomNav" aria-label="操作">
    <div class="bottomInner">
      <button class="navBtn" id="prevBtn">戻る</button>
      <button class="navBtn primary" id="nextBtn">次へ</button>
    </div>
  </nav>

  <script>
    const originalQuestions = [
      // --- 既存のブラッシュアップ (EQ理論ベース) ---
      { id: 1, text: "ダニエル・ゴールマンは、IQや専門知識が『門番』のような役割を果たす一方で、優れたリーダーを分ける決定的な要素は自己認識や共感力といった「EQ（感情知能）」であると提唱していますが、これは正しいでしょうか？", answer: true, explain: "IQは仕事への入り口に過ぎず、トップに上り詰める人を分けるのはEQであるとされています。" },
      { id: 2, text: "「6つのリーダーシップスタイル」において、リーダーは自分の性格に最も合った1つのスタイルを極めることが、組織のパフォーマンスを最大化させる唯一の方法であると説明されていますが、どう思いますか？", answer: false, explain: "優れたリーダーは、ゴルフのクラブを使い分けるように、状況に応じて複数のスタイルを使い分けます。" },
      { id: 3, text: "目標達成に執着するあまり感情を無視したマネジメントを行うと、短期的には数字が出るかもしれませんが、組織の持続可能性やメンバーの自律性を損なうため、長期的には推奨されないという考えは正しいでしょうか？", answer: true, explain: "感情を無視した運営は、メンバーの燃え尽きや離職を招き、組織を脆弱にします。" },
      { id: 4, text: "「ビジョン型」リーダーは、明確な目的を語ることでメンバーの意欲を高める長所がありますが、具体的な行動指針や実行力が伴わない場合、単なる「空想家」として信頼を失うリスクを孕んでいるでしょうか？", answer: true, explain: "方向性を示すだけでなく、それが現実的なステップとして機能しているかが重要です。" },
      { id: 5, text: "「コーチ型」は個人の長所に焦点を当て、長期的な成長を促すのに非常に有効な手法ですが、一分一秒を争うような緊急事態や、即効性が求められる場面では、その効果が十分に発揮されないという側面があるでしょうか？", answer: true, explain: "育成には時間がかかるため、危機の真っ只中では他のスタイル（強制型など）との併用が必要です。" },
      { id: 6, text: "「関係重視型」のリーダーは、チームの調和を保ち心理的安全性を高めるのが得意ですが、和を重んじるあまり、パフォーマンスの低いメンバーに対して厳しいフィードバックを行うことが遅れる弊害があるでしょうか？", answer: true, explain: "優しさが「甘さ」に変わると、組織全体の規律が乱れるリスクがあります。" },
      { id: 7, text: "「民主型」のリーダーシップは、全員の意見を吸い上げることで納得感と帰属意識を高めますが、迅速かつ果断な意思決定が求められる局面において、最も高い成果を発揮するスタイルと言えるでしょうか？", answer: false, explain: "民主型は合意形成に時間がかかるため、スピードが命の場面では不向きです。" },
      { id: 8, text: "リーダーが自ら高い基準を示して牽引する「率先型」は、優秀なチームでは爆発的な成果を生みますが、リーダーに依存しすぎて部下の主体性が育たなくなったり、周囲が疲弊したりする副作用があるでしょうか？", answer: true, explain: "「自分でやったほうが早い」が続くと、組織としての成長が止まってしまいます。" },
      { id: 9, text: "「強制型（指示命令型）」は現代では敬遠されがちですが、組織が深刻な危機に瀕している場合や、一刻を争うトラブル対応が必要な場面においては、最も効果的で強力な手段になり得るでしょうか？", answer: true, explain: "火事の現場で合議制は取れません。危機管理においては必須のスタイルです。" },
      { id: 10, text: "最も優れたリーダーは、平時と危機、組織の成長フェーズ、あるいは向き合う個人の特性という「状況」に応じて、これら複数のスタイルを柔軟に使い分けていると言えるでしょうか？", answer: true, explain: "単一のスタイルに固執せず、状況というキャンバスに最適な色を塗るのが真のリーダーです。" },

      // --- 新規追加分 (JC・LOM・アカデミー関連) ---
      { id: 11, text: "日本青年会議所の各協議会は、LOMの活動とは切り離された独立した組織として活動すべきであり、LOMの運営には干渉しない関係が理想であるとされていますが、正しいでしょうか？", answer: false, explain: "協議会での学びやネットワークは、最終的にLOM（各地会員会議所）へ還元されるべきものです。" },
      { id: 12, text: "アカデミー事業で得られる高い熱量やリーダーシップの学びは、出向者個人の成長に留まらず、その熱がLOM全体へ波及していくことで組織の活性化につながると説明されていますが、どう思いますか？", answer: true, explain: "個人の変容が周囲を巻き込み、LOM全体の運動の質を高める起点となります。" },
      { id: 13, text: "地域のリーダーを育成する上では、LOM内だけの研修や活動で完結する人財育成プログラムを構築することが、最も重要かつ効率的な手法であるとされていますが、正しいでしょうか？", answer: false, explain: "外部（出向等）での多様な経験や視点を取り入れることが、真に強いリーダーを育てます。" },
      { id: 14, text: "協議会やブロック、地区への出向は、日常のルーティンを超えた「リーダー輩出の機会」であり、多様な価値観に触れることで自己の殻を破るチャンスとして紹介されているでしょうか？", answer: true, explain: "アウェイな環境での経験こそが、リーダーとしての器を大きく広げます。" },
      { id: 15, text: "東北地区のリーダー育成においては、歴史ある「ゼミナール制度」が特徴として挙げられ、深い対話と研鑽を通じて次代のリーダーを育てていると紹介されていますが、これは正しいでしょうか？", answer: true, explain: "ゼミナール制は東北地区の伝統的な強みであり、強固な繋がりを育む文化です。" },
      { id: 16, text: "愛知ブロックにおいては、メンバー同士の「接触頻度」を戦略的に高めることで、信頼関係の構築を加速させ、より強固なメンバー育成を実現していると説明されているでしょうか？", answer: true, explain: "単純接触回数は信頼に比例します。高頻度の交流が強固な結束を生みます。" },
      { id: 17, text: "本セミナー（フォーラム）では、知識の習得だけでなく「失敗を恐れず挑戦する姿勢」そのものを大切にしており、そのマインドセットこそがリーダーの原点であると説いているでしょうか？", answer: true, explain: "完璧を目指すことより、まず一歩を踏み出し、失敗から学ぶ姿勢が重要です。" }
    ];

    let questions = [...originalQuestions]; // may shuffle
    let idx = 0; // 0..9
    const answers = new Map(); // id -> true/false

    const qArea = document.getElementById("qArea");
    const posEl = document.getElementById("pos");
    const answeredEl = document.getElementById("answered");
    const barEl = document.getElementById("bar");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const shuffleEl = document.getElementById("shuffle");
    const modeBadge = document.getElementById("modeBadge");

    const resultCard = document.getElementById("resultCard");
    const resultBody = document.getElementById("resultBody");

    function shuffle(array){
      for(let i=array.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
      }
      return array;
    }

    function gradeByScore(score){
      if(score === 17) return { label:"【特級】エグゼクティブ・リーダー", cls:"special", msg:"リーダーシップの本質を完璧に捉えています。この高い視座を組織全体に浸透させ、さらなる高みを目指す強固な組織を構築するために、LOMメンバーをアカデミーに出向させよう！" };
      if(score >= 14) return { label:"【1級】戦略的リーダー", cls:"one", msg:"状況に応じた卓越した判断力をお持ちです。あなたの戦略を具現化し、共に組織を牽引する強力な次世代リーダーを育成するため、LOMメンバーをアカデミーに出向させよう！" };
      if(score >= 11) return { label:"【2級】チームリーダー", cls:"two", msg:"リーダーとしての土台がしっかり築かれています。個人の力から組織の力へとシフトし、チーム全体のポテンシャルを最大限に引き出す環境を作るため、LOMメンバーをアカデミーに出向させよう！" };
      return { label:"【3級】リーダー候補生", cls:"three", msg:"大きな成長の可能性を秘めています。まずは組織としての共通言語を学び、チーム一丸となって変革の一歩を踏み出すきっかけを作るため、LOMメンバーをアカデミーに出向させよう！" };
    }

    function updateProgress(){
      posEl.textContent = (idx + 1);
      answeredEl.textContent = answers.size;
      const pct = Math.round(((idx+1) / 17) * 100);
      barEl.style.width = pct + "%";

      prevBtn.disabled = (idx === 0);

      if(idx < 16){
        nextBtn.textContent = "次へ";
      }else{
        nextBtn.textContent = "採点する";
      }
    }

    function renderQuestion(){
      const q = questions[idx];
      const ua = answers.has(q.id) ? answers.get(q.id) : null;

      qArea.innerHTML = `
        <div class="qNo">
          <div>問題${q.id}</div>
          <div class="badge">あなたの回答：<b style="color:var(--text)">${ua === null ? "未回答" : (ua ? "〇" : "×")}</b></div>
        </div>
        <p class="qText">${q.text}</p>

        <div class="choices" role="group" aria-label="問題${q.id}の回答">
          <button class="choiceBtn" data-v="true">〇</button>
          <button class="choiceBtn" data-v="false">×</button>
        </div>

        <div class="hint">ヒント：迷ったら一旦選んでOK（あとで「戻る」で変更できます）。</div>
      `;

      // bind
      qArea.querySelectorAll(".choiceBtn").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const v = btn.getAttribute("data-v") === "true";
          answers.set(q.id, v);

          qArea.querySelectorAll(".choiceBtn").forEach(b=>b.classList.remove("selected"));
          btn.classList.add("selected");

          // update top badge
          const badge = qArea.querySelector(".qNo .badge b");
          badge.textContent = v ? "〇" : "×";

          updateProgress();
        });
      });

      // restore selected
      if(ua !== null){
        const selected = qArea.querySelector(`.choiceBtn[data-v="${ua}"]`);
        if(selected) selected.classList.add("selected");
      }

      updateProgress();
    }

    function showResults(){
      // score
      let correct = 0;
      const details = originalQuestions.map(q=>{
        const ua = answers.has(q.id) ? answers.get(q.id) : null;
        const ok = (ua !== null) && (ua === q.answer);
        if(ok) correct++;
        return { ...q, userAnswer: ua, ok };
      });

      const g = gradeByScore(correct);

      resultCard.style.display = "block";
      resultBody.innerHTML = `
        <div class="scoreLine">
          <div class="score">${correct}<span style="font-size:14px; font-weight:900; color:var(--muted)"> / 17</span></div>
          <div class="grade ${g.cls}">${g.label}</div>
        </div>
        <div class="summary">${g.msg}</div>

        <div class="ghostActions">
          <button class="ghostBtn" id="retryBtn">最初からやり直す</button>
          <button class="ghostBtn" id="jumpTopBtn">先頭（問題1）へ</button>
        </div>

        <div class="review" aria-label="解説レビュー">
          ${details.map(d=>{
            const statusCls = d.ok ? "ok" : "ng";
            // 間違えた問題はデフォルトで開いておく (open属性)
            const isOpen = d.ok ? "" : "open"; 
            
            return `
              <details ${isOpen}>
                <summary>
                  <span>問題${d.id}</span>
                  <span class="mark ${statusCls}">${d.ok ? "正解" : "要チェック"}</span>
                </summary>
                <div class="detailBody">
                  <div style="margin-bottom:8px;">${d.text}</div>
                  <div>あなたの回答：<b>${d.userAnswer === null ? "未回答" : (d.userAnswer ? "〇" : "×")}</b> ／ 正解：<b>${d.answer ? "〇" : "×"}</b></div>
                  <div style="margin-top:12px; padding:10px; background:rgba(255,255,255,0.05); border-radius:8px;">
                    <b style="color:var(--accent)">【解説】</b><br>${d.explain}
                  </div>
                </div>
              </details>
            `;
          }).join("")}
        </div>
      `;

      // actions
      document.getElementById("retryBtn").addEventListener("click", resetAll);
      document.getElementById("jumpTopBtn").addEventListener("click", ()=>{
        idx = 0;
        resultCard.style.display = "none";
        renderQuestion();
        window.scrollTo({top:0, behavior:"smooth"});
      });

      // scroll
      resultCard.scrollIntoView({behavior:"smooth", block:"start"});
    }

    function resetAll(){
      answers.clear();
      idx = 0;
      resultCard.style.display = "none";
      renderQuestion();
      window.scrollTo({top:0, behavior:"smooth"});
    }

    prevBtn.addEventListener("click", ()=>{
      if(idx > 0){
        idx--;
        resultCard.style.display = "none";
        renderQuestion();
        window.scrollTo({top:0, behavior:"smooth"});
      }
    });

    nextBtn.addEventListener("click", ()=>{
      if(idx < 16){
        idx++;
        resultCard.style.display = "none";
        renderQuestion();
        window.scrollTo({top:0, behavior:"smooth"});
      }else{
        // last -> score
        showResults();
      }
    });

    shuffleEl.addEventListener("change", ()=>{
      // Keep answers by question id; only reorder display.
      questions = [...originalQuestions];
      if(shuffleEl.checked){
        shuffle(questions);
        modeBadge.textContent = "出題：シャッフル";
      }else{
        modeBadge.textContent = "出題：固定順";
      }
      idx = 0;
      resultCard.style.display = "none";
      renderQuestion();
      window.scrollTo({top:0, behavior:"smooth"});
    });

    // initial
    renderQuestion();
  </script>
</body>
</html>
